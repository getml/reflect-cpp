name: windows

on: [ push, pull_request ]

env:
    VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  windows-msvc:
    strategy:
      fail-fast: false
    name: "windows-msvc (${{ matrix.format }})"
    concurrency:
      group: "windows-${{ github.ref }}-${{ github.job }}"
      cancel-in-progress: true
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: lukka/run-vcpkg@v11
      - name: Compile library
        run: |
          cmake -S . -B build -DCMAKE_CXX_STANDARD=20 -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j4
      - name: Build application installer
        run: cpack --preset windows-release-installer
      - name: Upload application installer
        uses: actions/upload-artifact@v7
        with:
          name: reflectcpp-installer
          path: build/*.msi

